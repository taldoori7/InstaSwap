<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>InstaSwap — Trade without cash</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --ink:#1e1a2e;
  --ink2:#2d2845;
  --coral:#b86450;
  --lime:#7dab5e;
  --gold:#b8913a;
  --cream:#f4f1ec;
  --card:#fff;
  --muted:#7a746e;
  --border:#dedad4;
  --border2:#b0a89e;
  --radius:14px;
  --shadow:0 4px 24px rgba(26,10,74,.1);
  --shadow-lg:0 8px 40px rgba(26,10,74,.18);

  /* category colors */
  --cat-electronics:#6080b0;
  --cat-music:#b86450;
  --cat-outdoors:#508a6a;
  --cat-sports:#b8913a;
  --cat-books:#705a9a;
  --cat-art:#a85070;
  --cat-other:#6a6258;
}
body{font-family:'Inter',sans-serif;background:var(--cream);color:var(--ink);min-height:100vh}
h1,h2,h3,.logo-text,.plan-price,.section-title{font-family:'Syne',sans-serif}

/* ── NAV ── */
.nav{background:var(--ink);padding:12px 20px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;position:sticky;top:0;z-index:50;border-bottom:2px solid var(--coral)}
.logo{display:flex;align-items:center;gap:8px;cursor:pointer;text-decoration:none}
.logo-icon{width:32px;height:32px;background:var(--coral);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:17px;transform:rotate(-8deg);transition:transform .2s}
.logo:hover .logo-icon{transform:rotate(8deg)}
.logo-text{font-size:17px;font-weight:800;color:#fff;letter-spacing:-.3px}
.logo-text span{color:var(--lime)}
.search-wrap{flex:1;min-width:130px;position:relative}
.search-wrap input{width:100%;padding:8px 12px 8px 34px;border:2px solid transparent;border-radius:10px;background:rgba(255,255,255,.1);color:#fff;font-size:13px;outline:none;font-family:'Inter',sans-serif;transition:all .2s}
.search-wrap input::placeholder{color:rgba(255,255,255,.4)}
.search-wrap input:focus{background:rgba(255,255,255,.18);border-color:var(--lime)}
.si{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:rgba(255,255,255,.5);font-size:15px}
.nav-tabs{display:flex;gap:3px}
.tab{padding:7px 13px;border-radius:9px;font-size:13px;cursor:pointer;background:none;color:rgba(255,255,255,.6);white-space:nowrap;position:relative;font-weight:600;border:2px solid transparent;font-family:'Inter',sans-serif;transition:all .18s}
.tab.active{background:var(--coral);color:#fff;border-color:var(--coral)}
.tab:hover:not(.active){background:rgba(255,255,255,.1);color:#fff}
.badge{position:absolute;top:2px;right:2px;width:8px;height:8px;background:var(--lime);border-radius:50%;border:2px solid var(--ink)}
.nav-auth{display:flex;gap:7px;flex-shrink:0}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:10px;font-size:13px;cursor:pointer;font-weight:600;border:2px solid transparent;transition:all .18s;font-family:'Inter',sans-serif;text-decoration:none}
.btn-coral{background:var(--coral);color:#fff;border-color:var(--coral)}
.btn-coral:hover{background:#e8431f;border-color:#e8431f;transform:translateY(-1px);box-shadow:0 4px 12px rgba(184,100,80,.3)}
.btn-lime{background:var(--lime);color:var(--ink);border-color:var(--lime)}
.btn-lime:hover{background:#6a9a4e;transform:translateY(-1px)}
.btn-outline{background:none;border:2px solid var(--border2);color:var(--ink)}
.btn-outline:hover{border-color:var(--ink);background:var(--ink);color:#fff}
.btn-ghost-dark{background:none;border:2px solid rgba(255,255,255,.25);color:#fff}
.btn-ghost-dark:hover{background:rgba(255,255,255,.12)}
.btn-sm{background:none;border:1.5px solid var(--border2);color:var(--muted);font-size:12px;padding:4px 10px;border-radius:8px;cursor:pointer;font-family:'Inter',sans-serif;font-weight:500;transition:all .15s}
.btn-sm:hover{border-color:var(--ink);color:var(--ink)}
.btn-acc{background:var(--lime);border:none;color:var(--ink);font-size:12px;padding:5px 12px;border-radius:8px;cursor:pointer;font-weight:700;font-family:'Inter',sans-serif;transition:all .15s}
.btn-acc:hover{background:#6a9a4e;transform:translateY(-1px)}
.btn-dec{background:none;border:1.5px solid var(--border2);color:var(--muted);font-size:12px;padding:5px 9px;border-radius:8px;cursor:pointer;font-family:'Inter',sans-serif}
.btn-blue{background:none;border:1.5px solid #a0bcd4;color:#4a6a90;font-size:12px;padding:4px 9px;border-radius:8px;cursor:pointer;font-family:'Inter',sans-serif;font-weight:500}
.btn-red{background:none;border:1.5px solid #d4aaaa;color:#824040;font-size:12px;padding:4px 9px;border-radius:8px;cursor:pointer;font-family:'Inter',sans-serif}
.btn-purple{background:linear-gradient(135deg,#5a5090,#7060a8);color:#fff;border:none;border-radius:10px;padding:9px 20px;font-size:13px;cursor:pointer;font-weight:700;font-family:'Syne',sans-serif;transition:all .18s}
.btn-purple:hover{opacity:.9;transform:translateY(-1px);box-shadow:0 6px 20px rgba(90,80,144,.3)}

/* ── CONTENT ── */
.content{padding:20px;max-width:900px;margin:0 auto}

/* ── HERO ── */
.hero{background:linear-gradient(135deg,var(--ink) 0%,var(--ink2) 60%,#302a52 100%);border-radius:20px;padding:28px 28px 24px;margin-bottom:20px;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;inset:0;background:url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.03'%3E%3Ccircle cx='30' cy='30' r='20'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");pointer-events:none}
.hero-inner{position:relative;z-index:1;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap}
.hero-left h2{font-size:24px;font-weight:800;color:#fff;line-height:1.2;margin-bottom:6px}
.hero-left h2 span{color:var(--lime)}
.hero-left p{font-size:13px;color:rgba(255,255,255,.65);margin-bottom:16px}
.hero-ctas{display:flex;gap:8px;flex-wrap:wrap}
.hero-stats{display:flex;gap:10px}
.hstat{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);border-radius:12px;padding:10px 16px;text-align:center;backdrop-filter:blur(4px)}
.hstat .n{font-size:22px;font-weight:800;color:var(--lime);font-family:'Syne',sans-serif}
.hstat .l{font-size:11px;color:rgba(255,255,255,.55);margin-top:1px}
.hero-swap-icon{font-size:52px;animation:pulse-swap 2s ease-in-out infinite;display:block}
@keyframes pulse-swap{0%,100%{transform:scale(1) rotate(-5deg)}50%{transform:scale(1.12) rotate(5deg)}}

/* ── GUEST BANNER ── */
.guest-banner{background:linear-gradient(135deg,#f5f0e6,#ede6d4);border:2px solid var(--gold);border-radius:14px;padding:14px 18px;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between;gap:12px}
.guest-banner p{font-size:13px;color:#6a5030}

/* ── LOC ROW ── */
.loc-row{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--muted);margin-bottom:12px;font-weight:500}
.loc-row strong{color:var(--ink)}

/* ── FILTER CHIPS ── */
.filter-bar{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap}
.chip{background:none;border:2px solid var(--border);border-radius:99px;padding:5px 14px;font-size:12px;cursor:pointer;color:var(--muted);font-weight:600;font-family:'Inter',sans-serif;transition:all .15s}
.chip:hover{border-color:var(--ink);color:var(--ink)}
.chip.active{background:var(--ink);border-color:var(--ink);color:#fff}
.chip.cat-electronics.active{background:var(--cat-electronics);border-color:var(--cat-electronics)}
.chip.cat-music.active{background:var(--cat-music);border-color:var(--cat-music)}
.chip.cat-outdoors.active{background:var(--cat-outdoors);border-color:var(--cat-outdoors)}
.chip.cat-sports.active{background:var(--cat-sports);border-color:var(--cat-sports);color:var(--ink)}
.chip.cat-books.active{background:var(--cat-books);border-color:var(--cat-books)}
.chip.cat-art.active{background:var(--cat-art);border-color:var(--cat-art)}

/* ── LISTINGS GRID ── */
.listings-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(175px,1fr));gap:14px;margin-bottom:22px}
.card{background:var(--card);border:2px solid var(--border);border-radius:var(--radius);overflow:hidden;cursor:pointer;transition:all .2s;position:relative}
.card:hover{box-shadow:var(--shadow-lg);transform:translateY(-3px);border-color:var(--border2)}
.card-stripe{height:5px;width:100%}
.card-img{height:100px;display:flex;align-items:center;justify-content:center;font-size:40px;background:linear-gradient(135deg,#f0ede8,#e8e4e0);position:relative;overflow:hidden}
.card-img img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0}
.card-img .ef{z-index:1;position:relative;filter:drop-shadow(0 2px 6px rgba(0,0,0,.15))}
.dist-pill{position:absolute;bottom:7px;right:7px;background:rgba(255,255,255,.92);border:1.5px solid var(--border);border-radius:99px;font-size:10px;padding:2px 8px;color:var(--muted);z-index:2;font-weight:600;backdrop-filter:blur(4px)}
.heart{position:absolute;top:8px;right:8px;background:rgba(255,255,255,.92);border:1.5px solid var(--border);border-radius:99px;width:30px;height:30px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:15px;z-index:3;color:var(--muted);transition:all .2s;backdrop-filter:blur(4px)}
.heart.on{color:#e24b4a;border-color:#d4aaaa;background:#ede8e6}
.heart:hover{transform:scale(1.2)}
.card-body{padding:11px 13px}
.card-title{font-size:13px;font-weight:700;margin-bottom:3px;font-family:'Syne',sans-serif;line-height:1.3}
.card-sub{font-size:11px;color:var(--muted);font-weight:500}
.card-tags{display:flex;gap:4px;flex-wrap:wrap;margin-top:7px}
.tag{font-size:10px;padding:3px 8px;border-radius:99px;background:#f0ebff;border:1.5px solid #ddd6f3;color:#6b4ec4;font-weight:600}
.tag.w{background:#e8f9ff;border-color:#b5e3f7;color:#0369a1}

/* ── CAT STRIPE COLORS ── */
.stripe-electronics{background:var(--cat-electronics)}
.stripe-music{background:var(--cat-music)}
.stripe-outdoors{background:var(--cat-outdoors)}
.stripe-sports{background:var(--cat-sports)}
.stripe-books{background:var(--cat-books)}
.stripe-art{background:var(--cat-art)}
.stripe-other{background:var(--cat-other)}

/* ── MAP ── */
.map-box{background:#dddad4;border:2px solid var(--border);border-radius:var(--radius);height:165px;position:relative;overflow:hidden;margin-bottom:16px}
.map-bg{width:100%;height:100%}
.mp{position:absolute;transform:translate(-50%,-100%);cursor:pointer;font-size:20px;filter:drop-shadow(0 2px 5px rgba(0,0,0,.35));transition:transform .15s}
.mp:hover{transform:translate(-50%,-100%) scale(1.25)}
.mp .tip{position:absolute;bottom:calc(100%+4px);left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;border-radius:8px;padding:4px 10px;font-size:11px;white-space:nowrap;opacity:0;pointer-events:none;transition:opacity .15s;font-weight:600;box-shadow:var(--shadow)}
.mp:hover .tip{opacity:1}
.you-dot{position:absolute;width:16px;height:16px;background:var(--coral);border:3px solid #fff;border-radius:50%;transform:translate(-50%,-50%);box-shadow:0 0 0 4px rgba(184,100,80,.2);animation:you-pulse 2s ease-in-out infinite}
@keyframes you-pulse{0%,100%{box-shadow:0 0 0 4px rgba(184,100,80,.2)}50%{box-shadow:0 0 0 8px rgba(184,100,80,.1)}}
.you-lbl{position:absolute;font-size:10px;color:var(--coral);font-weight:700;transform:translate(-50%,6px);font-family:'Syne',sans-serif}

/* ── SECTION HEADER ── */
.sec-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.section-title{font-size:15px;font-weight:800;color:var(--ink)}

/* ── SUGGESTIONS ── */
.sug-list{display:flex;flex-direction:column;gap:10px;margin-bottom:22px}
.sug-card{background:var(--card);border:2px solid #a8c880;border-radius:14px;padding:13px 16px;display:flex;align-items:center;gap:13px;cursor:pointer;transition:all .18s;position:relative;overflow:hidden}
.sug-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--lime)}
.sug-card:hover{box-shadow:var(--shadow);transform:translateX(3px)}
.sug-score{font-size:12px;padding:4px 10px;border-radius:99px;background:var(--lime);color:var(--ink);font-weight:800;flex-shrink:0;font-family:'Syne',sans-serif}
.sug-info{flex:1;min-width:0}
.sug-title{font-size:13px;font-weight:700;margin-bottom:2px;font-family:'Syne',sans-serif}
.sug-why{font-size:12px;color:var(--muted)}

/* ── UPGRADE BANNER ── */
.upgrade-banner{background:linear-gradient(135deg,#eeeaf5,#e6e2f0);border:2px solid #c4b5fd;border-radius:14px;padding:14px 18px;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between;gap:12px}

/* ── OFFER CARDS ── */
.offer-list{display:flex;flex-direction:column;gap:10px;margin-bottom:22px}
.offer-card{background:var(--card);border:2px solid var(--border);border-radius:14px;padding:13px 15px;display:flex;align-items:flex-start;gap:11px;transition:border-color .15s}
.offer-card:hover{border-color:var(--border2)}
.ava{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;flex-shrink:0;font-family:'Syne',sans-serif}
.om{flex:1;min-width:0}
.otitle{font-size:13px;font-weight:700;font-family:'Syne',sans-serif}
.orow{display:flex;align-items:center;gap:6px;margin-top:6px;flex-wrap:wrap}
.pill{font-size:11px;padding:4px 10px;border-radius:99px;background:#f0ebff;border:1.5px solid #ddd6f3;color:#6b4ec4;font-weight:600}
.oacts{display:flex;gap:5px;flex-shrink:0;flex-direction:column;align-items:flex-end}
.sbadge{font-size:11px;padding:4px 10px;border-radius:99px;font-weight:700;font-family:'Syne',sans-serif}
.sbadge.pending{background:#ede8d4;color:#6a5030;border:1.5px solid var(--gold)}
.sbadge.accepted{background:#c8e4d4;color:#3a6a50;border:1.5px solid #7abda0}
.sbadge.rated{background:#ede8ff;color:var(--ink2);border:1.5px solid #c4b5fd}

/* ── AVATAR COLORS ── */
.ava-coral{background:#ffe8e3;color:var(--coral)}
.ava-blue{background:#e0eaf2;color:#4a6a90}
.ava-lime{background:#f0ffd4;color:#4a7c00}
.ava-purple{background:#f0ebff;color:#6b4ec4}
.ava-gold{background:#ede8d4;color:#6a5030}

/* ── THREADS ── */
.thread-list{display:flex;flex-direction:column;gap:8px}
.thread{background:var(--card);border:2px solid var(--border);border-radius:14px;padding:12px 15px;display:flex;align-items:center;gap:11px;cursor:pointer;transition:all .18s}
.thread:hover{border-color:var(--coral);transform:translateX(3px)}
.thread.unread{border-color:#a0bcd4;background:#f7fbff}
.tinfo{flex:1;min-width:0}
.tname{font-size:13px;font-weight:700;font-family:'Syne',sans-serif}
.tprev{font-size:12px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px}
.udot{width:9px;height:9px;background:var(--coral);border-radius:50%;flex-shrink:0}

/* ── TIMELINE ── */
.timeline{display:flex;flex-direction:column;padding-left:30px;position:relative}
.timeline::before{content:'';position:absolute;left:11px;top:8px;bottom:8px;width:2px;background:var(--border)}
.tl-item{position:relative;padding-bottom:18px}
.tl-item:last-child{padding-bottom:0}
.tl-dot{position:absolute;left:-23px;top:5px;width:18px;height:18px;border-radius:50%;border:3px solid var(--cream);display:flex;align-items:center;justify-content:center;font-size:8px;z-index:1;color:#fff;font-weight:700}
.tl-dot.completed{background:var(--lime);color:var(--ink)}
.tl-dot.pending{background:var(--gold)}
.tl-dot.declined{background:var(--muted)}
.tl-card{background:var(--card);border:2px solid var(--border);border-radius:12px;padding:11px 14px;transition:border-color .15s}
.tl-card:hover{border-color:var(--border2)}
.tl-date{font-size:11px;color:var(--muted);margin-bottom:4px;font-weight:600}
.tl-title{font-size:13px;font-weight:700;margin-bottom:4px;font-family:'Syne',sans-serif}

/* ── PROFILE BAR ── */
.profile-bar{display:flex;align-items:center;gap:13px;margin-bottom:18px;background:var(--ink);border-radius:16px;padding:16px 18px;position:relative;overflow:hidden}
.profile-bar::after{content:'⇄';position:absolute;right:20px;top:50%;transform:translateY(-50%);font-size:60px;opacity:.06;font-family:'Syne',sans-serif;color:#fff;pointer-events:none}
.p-ava{width:46px;height:46px;border-radius:50%;border:2px solid var(--coral);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:17px;color:#fff;flex-shrink:0;font-family:'Syne',sans-serif;background:var(--ink2)}
.pname{font-size:15px;font-weight:800;color:#fff;font-family:'Syne',sans-serif}
.prep{font-size:12px;color:rgba(255,255,255,.55);margin-top:2px}
.stars{color:var(--gold)}
.inner-tabs{display:flex;gap:5px;margin-bottom:16px;flex-wrap:wrap}
.itab{padding:6px 14px;border:2px solid var(--border);border-radius:99px;font-size:12px;cursor:pointer;background:none;color:var(--muted);font-weight:700;font-family:'Syne',sans-serif;transition:all .15s}
.itab.active{background:var(--ink);color:#fff;border-color:var(--ink)}
.itab:hover:not(.active){border-color:var(--ink);color:var(--ink)}

/* ── PLAN CARDS ── */
.plans-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:16px;margin-bottom:20px}
.plan-card{background:var(--card);border:2px solid var(--border);border-radius:18px;padding:24px;position:relative}
.plan-card.featured{border:2px solid var(--coral);background:linear-gradient(160deg,#fff8f6 0%,#fff 60%)}
.plan-badge{position:absolute;top:-13px;left:50%;transform:translateX(-50%);background:linear-gradient(135deg,var(--coral),#9e4a38);color:#fff;font-size:11px;font-weight:800;padding:4px 16px;border-radius:99px;white-space:nowrap;font-family:'Syne',sans-serif;box-shadow:0 4px 12px rgba(184,100,80,.3)}
.plan-name{font-size:12px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px;font-family:'Syne',sans-serif}
.plan-price{font-size:34px;font-weight:800;color:var(--ink);margin-bottom:2px}
.plan-price span{font-size:14px;font-weight:500;color:var(--muted);font-family:'Inter',sans-serif}
.plan-save{font-size:12px;color:#3a6a50;font-weight:700;margin-bottom:16px;background:#c8e4d4;display:inline-block;padding:2px 10px;border-radius:99px}
.plan-features{list-style:none;margin-bottom:20px;display:flex;flex-direction:column;gap:8px}
.plan-features li{font-size:13px;display:flex;align-items:center;gap:8px}
.plan-features li::before{content:'✓';color:#3a6a50;font-weight:800;flex-shrink:0;background:#c8e4d4;width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px}
.plan-features li.no::before{content:'✕';color:var(--muted);background:#f0f0f0}
.plan-features li.no{color:var(--muted)}
.current-plan-banner{background:linear-gradient(135deg,var(--ink),var(--ink2));border-radius:14px;padding:16px 20px;margin-bottom:18px;display:flex;align-items:center;justify-content:space-between;gap:12px}
.plan-pill{font-size:11px;padding:4px 12px;border-radius:99px;font-weight:800;font-family:'Syne',sans-serif}
.plan-pill.free{background:rgba(255,255,255,.15);color:#fff}
.plan-pill.monthly{background:#5878a8;color:#fff}
.plan-pill.annual{background:linear-gradient(135deg,#5a5090,#7060a8);color:#fff}

/* ── NOTIF TOGGLES ── */
.notif-row{display:flex;align-items:center;justify-content:space-between;padding:13px 0;border-bottom:1.5px solid var(--border)}
.notif-row:last-child{border-bottom:none}
.toggle{width:42px;height:24px;border-radius:99px;border:none;cursor:pointer;position:relative;transition:background .2s;flex-shrink:0}
.toggle.on{background:var(--lime)}
.toggle.off{background:#d1c8e8}
.toggle::after{content:'';position:absolute;top:3px;width:18px;height:18px;border-radius:50%;background:#fff;transition:left .2s;box-shadow:0 1px 4px rgba(0,0,0,.2)}
.toggle.on::after{left:21px}
.toggle.off::after{left:3px}

// ── TABS ──
function switchTab(t){
  if(currentUser==='guest'&&t!=='browse'){openLogin();return;}
  activeTab=t;
  ['browse','offers','messages','mine'].forEach(x=>{const el=document.getElementById('tab-'+x);if(el)el.classList.toggle('active',x===t);});
  render();
}
function onSearch(){searchQ=document.getElementById('search-inp').value.toLowerCase();if(activeTab!=='browse')switchTab('browse');else render();}
function render(){
  const c=document.getElementById('content');if(!c)return;
  if(activeTab==='browse')c.innerHTML=renderBrowse();
  else if(activeTab==='offers')c.innerHTML=renderOffers();
  else if(activeTab==='messages')c.innerHTML=renderMessages();
  else c.innerHTML=renderMine();
  updateBadges();
}
function updateBadges(){
  const p=offers.filter(o=>o.status==='pending').length;
  const be=document.getElementById('bdg-offers');if(be)be.style.display=p?'':'none';
  const u=threads.filter(t=>t.unread).length;
  const bm=document.getElementById('bdg-msgs');if(bm)bm.style.display=u?'':'none';
}

// ── BROWSE ──
function computeSuggestions(){
  const myWants=myListings.flatMap(l=>l.wants.map(w=>w.toLowerCase()));
  const myCats=myListings.map(l=>l.category);
  return listings.map(l=>{
    let score=0;const reasons=[];
    if(myCats.includes(l.category)){score+=30;reasons.push("matches a category you list in");}
    const tl=l.title.toLowerCase();
    myWants.forEach(w=>{if(tl.includes(w.split(' ')[0])||w.includes(tl.split(' ')[0])){score+=40;reasons.push(`matches your want: "${w}"`);}});
    const myT=myListings.map(m=>m.title.toLowerCase());
    l.wants.forEach(w=>{const wl=w.toLowerCase();myT.forEach(mt=>{if(mt.includes(wl.split(' ')[0])||wl.includes(mt.split(' ')[0])){score+=50;reasons.push(`they want something like your "${mt}"`);}});});
    const d=parseFloat(l.dist);if(d<2)score+=20;else if(d<4)score+=10;
    if(l.ownerRep>=4.8)score+=10;
    if(savedIds.has(l.id)){score+=25;reasons.push("you've saved this");}
    return{...l,score,why:[...new Set(reasons)][0]||"similar to your interests"};
  }).filter(l=>l.score>0).sort((a,b)=>b.score-a.score).slice(0,3);

function doLogin(){
  const email=document.getElementById('login-email').value.trim().toLowerCase();
  const pw=document.getElementById('login-pw').value;
  const user=registeredUsers.find(u=>u.email===email&&u.password===pw);
  if(!user){const err=document.getElementById('auth-error');err.textContent='Incorrect email or password. Try: alex@demo.com / demo123';err.style.display='block';return;}
  currentUser={...user};userPlan=user.plan||'free';userCity=user.city||userCity;
  closeModal();renderMain();showToast(`Welcome back, ${user.name.split(' ')[0]}!`,'👋');
}

function doSignup(){

  const city=document.getElementById('su-city').value.trim();

  if(!name){err.textContent='Enter your name.';err.style.display='block';return;}
  if(!email||!email.includes('@')){err.textContent='Enter a valid email.';err.style.display='block';return;}
  if(pw.length<6){err.textContent='Password must be at least 6 characters.';err.style.display='block';return;}
  const initials=name.split(' ').map(w=>w[0]).join('').substring(0,2).toUpperCase();
  const newUser={email,password:pw,name,initials,rep:5.0,swaps:0,city:city||'Dubai, UAE',bio:'New to InstaSwap!',joined:'Jun 2026',plan:'free'};
  registeredUsers.push(newUser);

}

function openThread(tid){
  const t=threads.find(x=>x.id===tid);if(!t)return;
  t.unread=false;updateBadges();
  showModal(`
    <div class="mhdr"><h3>${t.with}</h3><button class="mcls" onclick="closeModal()">✕</button></div>
    <div class="chat-wrap">
      <div class="chat-msgs" id="cm-${tid}">${t.messages.map(m=>`<div><div class="msg ${m.from==='me'?'mine':'theirs'}">${m.text}<div class="msg-time">${m.time}</div></div></div>`).join('')}</div>
      <div class="chat-foot"><input type="text" id="ci-${tid}" placeholder="Message ${t.with}..." onkeydown="if(event.key==='Enter')sendMsg(${tid})"><button class="send-btn" onclick="sendMsg(${tid})">➤</button></div>
    </div>
  `);
  setTimeout(()=>{const el=document.getElementById('cm-'+tid);if(el)el.scrollTop=el.scrollHeight;},40);
}

function sendMsg(tid){
  const inp=document.getElementById('ci-'+tid);const text=(inp&&inp.value||'').trim();if(!text)return;
  const t=threads.find(x=>x.id===tid);if(!t)return;
  t.messages.push({from:'me',text,time:'Just now'});inp.value='';
  const msgs=document.getElementById('cm-'+tid);
  if(msgs){const d=document.createElement('div');d.innerHTML=`<div class="msg mine">${text}<div class="msg-time">Just now</div></div>`;msgs.appendChild(d);msgs.scrollTop=msgs.scrollHeight;}
}

function setRating(n){_ratingVal=n;for(let i=1;i<=5;i++){const s=document.getElementById('star-'+i);if(s){s.textContent=i<=n?'★':'☆';s.classList.toggle('lit',i<=n);}}}

function submitRating(offerId){
  if(!_ratingVal){showToast('Pick a star rating first','⚠️');return;}
  const o=offers.find(x=>x.id===offerId);if(o)o.rated=true;
  const note=document.getElementById('rate-comment').value.trim();
  history.unshift({id:Date.now(),type:'completed',date:'Jun 28, 2026',gave:o?`${o.myEmoji} ${o.myItem}`:'Item',got:o?`${o.theirEmoji} ${o.theirItem}`:'Item',with:o?o.from:'',rating:_ratingVal,note});
  if(currentUser&&currentUser!=='guest')currentUser.swaps=(currentUser.swaps||0)+1;
  closeModal();showToast('Rating submitted — thanks!','⭐');render();_ratingVal=0;
}

function selectReport(btn,opt){document.querySelectorAll('.report-opt').forEach(b=>b.classList.remove('sel'));btn.classList.add('sel');}

function renderPhotoSlots(){
  let s='';
  for(let i=0;i<3;i++){
    if(addPhotoSlots[i])s+=`<div class="photo-slot"><img src="${addPhotoSlots[i]}" alt="Photo"><button class="rm-photo" onclick="removePhoto(${i})">✕</button></div>`;
    else s+=`<label class="photo-slot"><span style="font-size:22px">📷</span><span>Add photo</span><input type="file" accept="image/*" onchange="addPhoto(event,${i})" style="position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%"></label>`;
  }
  return s;
}
function addPhoto(e,idx){const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{addPhotoSlots[idx]=ev.target.result;const g=document.getElementById('photo-grid');if(g)g.innerHTML=renderPhotoSlots();};r.readAsDataURL(f);}
function removePhoto(idx){addPhotoSlots.splice(idx,1);const g=document.getElementById('photo-grid');if(g)g.innerHTML=renderPhotoSlots();}
function selEmoji(btn,e){document.querySelectorAll('[data-emoji]').forEach(b=>{b.style.background='linear-gradient(135deg,#f0ede8,#e8e4e0)';b.style.borderColor='var(--border)';});btn.style.background='var(--lime)';btn.style.borderColor='var(--lime)';document.getElementById('emoji-val').value=e;}
function addListing(){
  const title=document.getElementById('new-title').value.trim();
  if(!title){showToast('Enter an item name first','⚠️');return;}
  const wants=document.getElementById('new-wants').value.split(',').map(s=>s.trim()).filter(Boolean);
  myListings.push({id:Date.now(),emoji:document.getElementById('emoji-val').value,title,category:document.getElementById('new-cat').value,condition:document.getElementById('new-cond').value,desc:document.getElementById('new-desc').value,wants:wants.length?wants:['Open to offers'],photos:[...addPhotoSlots]});
  addPhotoSlots=[];closeModal();setMineTab('listings');switchTab('mine');showToast('Listing posted!','🎉');
}

function sendOffer(listingId){
  if(!canDo('offer')){showToast('Offer limit reached — upgrade','⚠️');return;}
  const sel=document.getElementById('offer-item').value;
  if(!sel){showToast('Select an item to offer','⚠️');return;}
  const myItem=myListings.find(m=>m.id==sel);
  const listing=listings.find(l=>l.id===listingId);
  const tid=Date.now();
  threads.push({id:tid,with:listing.owner,withInit:listing.ownerInit,unread:false,messages:[{from:'me',text:document.getElementById('offer-msg').value||'Hi, interested in a swap!',time:'Just now'}]});
  offers.unshift({id:Date.now(),from:listing.owner,fromInit:listing.ownerInit,fromRep:listing.ownerRep,fromDist:listing.dist,fromSwaps:listing.ownerSwaps,theirItem:listing.title,theirEmoji:listing.emoji,myItem:myItem.title,myEmoji:myItem.emoji,status:'pending',msg:document.getElementById('offer-msg').value,threadId:tid});
  closeModal();showToast('Swap offer sent!','⇄');updateBadges();
}

  `);
}
function downgradePlan(){userPlan='free';closeModal();render();showToast('Subscription cancelled.','ℹ️');}

function openLocationModal(){
  showModal(`
    <div class="mhdr"><h3>Your location</h3><button class="mcls" onclick="closeModal()">✕</button></div>
    <div class="fg"><label>City / neighbourhood</label><input type="text" id="loc-inp" value="${userCity}" placeholder="e.g. Austin, TX"></div>
    <div class="fg"><label>Search radius</label><select id="loc-radius"><option>1 mile</option><option selected>5 miles</option><option>10 miles</option><option>25 miles</option></select></div>
    <button class="btn btn-coral" style="width:100%;padding:10px;font-family:Syne,sans-serif" onclick="saveLocation()">📍 Update location</button>
  `);
}
function saveLocation(){const v=document.getElementById('loc-inp').value.trim();if(v){userCity=v;if(currentUser&&currentUser!=='guest')currentUser.city=v;}closeModal();render();showToast('Location updated to '+userCity+'!','📍');}

function acceptOffer(id){offers.find(o=>o.id===id).status='accepted';render();showToast('Swap accepted!','🎉');}
function declineOffer(id){offers=offers.filter(o=>o.id!==id);render();showToast('Offer declined.','✓');}
function removeListing(id){myListings=myListings.filter(l=>l.id!==id);render();showToast('Listing removed.','✓');}
function setFilter(f){activeFilter=f;render();}
function setMineTab(t){mineTab=t;render();}
function toggleSave(id){if(savedIds.has(id)){savedIds.delete(id);showToast('Removed from wishlist.','♡');}else{savedIds.add(id);showToast('Saved to wishlist!','♥');}render();}
function toggleNotif(k){notifPrefs[k]=!notifPrefs[k];render();}

function showModal(html){document.getElementById('modal-root').innerHTML=`<div class="modal-bd" onclick="closeModal(event)"><div class="modal" onclick="event.stopPropagation()">${html}</div></div>`;}
function closeModal(e){if(e&&e.target!==e.currentTarget)return;document.getElementById('modal-root').innerHTML='';}

let _tt;
function showToast(msg,icon='✓'){clearTimeout(_tt);document.getElementById('toast-msg').textContent=msg;document.getElementById('toast-icon').textContent=icon;document.getElementById('toast').classList.add('show');_tt=setTimeout(()=>document.getElementById('toast').classList.remove('show'),3000);}

renderApp();
</script>
</body>
</html>
